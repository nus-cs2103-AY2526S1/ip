plugins {
    id 'java'
    id 'application'
    id 'checkstyle'
    id 'org.openjfx.javafxplugin' version '0.0.13'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    modularity.inferModulePath.set(false)
}

dependencies {
    testImplementation group: 'org.junit.jupiter', name: 'junit-jupiter-api', version: '5.10.0'
    testRuntimeOnly group: 'org.junit.jupiter', name: 'junit-jupiter-engine', version: '5.10.0'

    // JavaFX base dependencies
    implementation 'org.openjfx:javafx-controls:17.0.2'
    implementation 'org.openjfx:javafx-fxml:17.0.2'

    // Cross-platform native libraries (runtimeOnly for fat JAR)
    runtimeOnly 'org.openjfx:javafx-controls:17.0.2:win'
    runtimeOnly 'org.openjfx:javafx-controls:17.0.2:linux'
    runtimeOnly 'org.openjfx:javafx-controls:17.0.2:mac'
    runtimeOnly 'org.openjfx:javafx-graphics:17.0.2:win'
    runtimeOnly 'org.openjfx:javafx-graphics:17.0.2:linux'
    runtimeOnly 'org.openjfx:javafx-graphics:17.0.2:mac'
    runtimeOnly 'org.openjfx:javafx-base:17.0.2:win'
    runtimeOnly 'org.openjfx:javafx-base:17.0.2:linux'
    runtimeOnly 'org.openjfx:javafx-base:17.0.2:mac'
    runtimeOnly 'org.openjfx:javafx-fxml:17.0.2:win'
    runtimeOnly 'org.openjfx:javafx-fxml:17.0.2:linux'
    runtimeOnly 'org.openjfx:javafx-fxml:17.0.2:mac'
}

test {
    useJUnitPlatform()

    testLogging {
        events "passed", "skipped", "failed"

        showExceptions true
        exceptionFormat "full"
        showCauses true
        showStackTraces true
        showStandardStreams = false
    }
}

application {
    mainClass.set("zbot.LauncherMain")
}


run{
    standardInput = System.in
}

checkstyle {
    toolVersion = '10.2'
}

javafx {
    version = '17.0.2'
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

shadowJar {
    archiveBaseName = "zbot"
    archiveClassifier = null

    // Critical for JavaFX fat JAR compatibility
    exclude 'module-info.class'
    exclude 'META-INF/versions/*/module-info.class'
    mergeServiceFiles()
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    manifest {
        attributes(
            'Main-Class': 'zbot.LauncherMain',
            'Implementation-Title': project.name,
            'Implementation-Version': project.version
        )
    }
}

