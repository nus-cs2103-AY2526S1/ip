name: Test Buddy JAR

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  test-jar:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'

    - name: Build JAR with Gradle
      run: ./gradlew clean shadowJar

    - name: Test JAR in headless mode
      run: |
        echo "list" | java -Djava.awt.headless=true -jar build/libs/buddy.jar

    - name: Test JAR with sample commands
      run: |
        echo -e "list\ntodo test task\nlist\nbye" | java -Djava.awt.headless=true -jar build/libs/buddy.jar

    - name: Upload JAR artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v3
      with:
        name: buddy-jar
        path: build/libs/buddy.jar